<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyCSS Donut - FIXED VERSION</title>
    <script type="module" src="https://esm.sh/@layoutit/polycss/elements"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a0f08;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid #ff6b35;
            z-index: 100;
        }
        h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            flex: 1;
            position: relative;
        }
        poly-camera {
            width: 100%;
            height: 100%;
            display: block;
            background: radial-gradient(circle at center, #2c1810 0%, #1a0f08 70%);
        }
        .info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 11px;
            border: 1px solid #ff6b35;
            z-index: 100;
        }
        .info div { margin: 3px 0; }
        .label { color: #888; }
        .value { color: #4ecdc4; margin-left: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>🍩 DONUT - FIXED VERSION</h1>
    </header>
    
    <div class="container">
        <poly-camera id="camera" rot-x="25" rot-y="30" distance="650">
            <poly-scene>
                <poly-orbit-controls drag wheel></poly-orbit-controls>
                <poly-ambient-light intensity="0.7"></poly-ambient-light>
                <poly-directional-light intensity="0.9" x="100" y="200" z="100"></poly-directional-light>
                
                <!-- DONUT MADE OF BOXES ARRANGED IN A CIRCLE -->
                <!-- Main donut ring - 24 segments -->
                <poly-group id="donut" y="0">
                    <!-- Segment 0 -->
                    <poly-box size="28" color="#8B4513" x="95" y="0" z="0" rot-y="0"></poly-box>
                    <!-- Segment 1 -->
                    <poly-box size="28" color="#8B4513" x="91.6" y="0" z="24.7" rot-y="15"></poly-box>
                    <!-- Segment 2 -->
                    <poly-box size="28" color="#8B4513" x="82.3" y="0" z="47.6" rot-y="30"></poly-box>
                    <!-- Segment 3 -->
                    <poly-box size="28" color="#8B4513" x="67.2" y="0" z="67.2" rot-y="45"></poly-box>
                    <!-- Segment 4 -->
                    <poly-box size="28" color="#8B4513" x="47.6" y="0" z="82.3" rot-y="60"></poly-box>
                    <!-- Segment 5 -->
                    <poly-box size="28" color="#8B4513" x="24.7" y="0" z="91.6" rot-y="75"></poly-box>
                    <!-- Segment 6 -->
                    <poly-box size="28" color="#8B4513" x="0" y="0" z="95" rot-y="90"></poly-box>
                    <!-- Segment 7 -->
                    <poly-box size="28" color="#8B4513" x="-24.7" y="0" z="91.6" rot-y="105"></poly-box>
                    <!-- Segment 8 -->
                    <poly-box size="28" color="#8B4513" x="-47.6" y="0" z="82.3" rot-y="120"></poly-box>
                    <!-- Segment 9 -->
                    <poly-box size="28" color="#8B4513" x="-67.2" y="0" z="67.2" rot-y="135"></poly-box>
                    <!-- Segment 10 -->
                    <poly-box size="28" color="#8B4513" x="-82.3" y="0" z="47.6" rot-y="150"></poly-box>
                    <!-- Segment 11 -->
                    <poly-box size="28" color="#8B4513" x="-91.6" y="0" z="24.7" rot-y="165"></poly-box>
                    <!-- Segment 12 -->
                    <poly-box size="28" color="#8B4513" x="-95" y="0" z="0" rot-y="180"></poly-box>
                    <!-- Segment 13 -->
                    <poly-box size="28" color="#8B4513" x="-91.6" y="0" z="-24.7" rot-y="195"></poly-box>
                    <!-- Segment 14 -->
                    <poly-box size="28" color="#8B4513" x="-82.3" y="0" z="-47.6" rot-y="210"></poly-box>
                    <!-- Segment 15 -->
                    <poly-box size="28" color="#8B4513" x="-67.2" y="0" z="-67.2" rot-y="225"></poly-box>
                    <!-- Segment 16 -->
                    <poly-box size="28" color="#8B4513" x="-47.6" y="0" z="-82.3" rot-y="240"></poly-box>
                    <!-- Segment 17 -->
                    <poly-box size="28" color="#8B4513" x="-24.7" y="0" z="-91.6" rot-y="255"></poly-box>
                    <!-- Segment 18 -->
                    <poly-box size="28" color="#8B4513" x="0" y="0" z="-95" rot-y="270"></poly-box>
                    <!-- Segment 19 -->
                    <poly-box size="28" color="#8B4513" x="24.7" y="0" z="-91.6" rot-y="285"></poly-box>
                    <!-- Segment 20 -->
                    <poly-box size="28" color="#8B4513" x="47.6" y="0" z="-82.3" rot-y="300"></poly-box>
                    <!-- Segment 21 -->
                    <poly-box size="28" color="#8B4513" x="67.2" y="0" z="-67.2" rot-y="315"></poly-box>
                    <!-- Segment 22 -->
                    <poly-box size="28" color="#8B4513" x="82.3" y="0" z="-47.6" rot-y="330"></poly-box>
                    <!-- Segment 23 -->
                    <poly-box size="28" color="#8B4513" x="91.6" y="0" z="-24.7" rot-y="345"></poly-box>
                    
                    <!-- ICING LAYER (pink, on top) -->
                    <poly-box size="26" color="#FF69B4" x="92" y="8" z="0" rot-y="0" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="88.7" y="8" z="23.9" rot-y="15" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="79.7" y="8" z="46.1" rot-y="30" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="65.1" y="8" z="65.1" rot-y="45" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="46.1" y="8" z="79.7" rot-y="60" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="23.9" y="8" z="88.7" rot-y="75" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="0" y="8" z="92" rot-y="90" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-23.9" y="8" z="88.7" rot-y="105" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-46.1" y="8" z="79.7" rot-y="120" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-65.1" y="8" z="65.1" rot-y="135" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-79.7" y="8" z="46.1" rot-y="150" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-88.7" y="8" z="23.9" rot-y="165" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-92" y="8" z="0" rot-y="180" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-88.7" y="8" z="-23.9" rot-y="195" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-79.7" y="8" z="-46.1" rot-y="210" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-65.1" y="8" z="-65.1" rot-y="225" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-46.1" y="8" z="-79.7" rot-y="240" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="-23.9" y="8" z="-88.7" rot-y="255" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="0" y="8" z="-92" rot-y="270" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="23.9" y="8" z="-88.7" rot-y="285" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="46.1" y="8" z="-79.7" rot-y="300" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="65.1" y="8" z="-65.1" rot-y="315" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="79.7" y="8" z="-46.1" rot-y="330" opacity="0.95"></poly-box>
                    <poly-box size="26" color="#FF69B4" x="88.7" y="8" z="-23.9" rot-y="345" opacity="0.95"></poly-box>
                    
                    <!-- SPRINKLES -->
                    <poly-box size="3" color="#FF0000" x="85" y="14" z="15" rot-x="20" rot-z="30"></poly-box>
                    <poly-box size="3" color="#00FF00" x="-75" y="13" z="60" rot-x="-15" rot-z="45"></poly-box>
                    <poly-box size="3" color="#0000FF" x="50" y="15" z="-80" rot-x="30" rot-z="-20"></poly-box>
                    <poly-box size="3" color="#FFFF00" x="-85" y="12" z="-25" rot-x="-25" rot-z="60"></poly-box>
                    <poly-box size="3" color="#FF00FF" x="25" y="14" z="88" rot-x="40" rot-z="-30"></poly-box>
                    <poly-box size="3" color="#00FFFF" x="70" y="13" z="-55" rot-x="-10" rot-z="15"></poly-box>
                </poly-group>
                
                <!-- Floating decorations -->
                <poly-icosahedron size="18" color="#FFD700" x="200" y="50" z="0"></poly-icosahedron>
                <poly-icosahedron size="18" color="#FF6347" x="-200" y="-30" z="50" opacity="0.8"></poly-icosahedron>
                <poly-icosahedron size="18" color="#40E0D0" x="0" y="80" z="-200" opacity="0.8"></poly-icosahedron>
            </poly-scene>
        </poly-camera>
        
        <div class="info">
            <div><span class="label">Polygons:</span><span class="value" id="poly-count">-</span></div>
            <div><span class="label">Elements:</span><span class="value" id="elem-count">-</span></div>
            <div><span class="label">Status:</span><span class="value" style="color: #4ade80;">✓ Loaded</span></div>
        </div>
    </div>

    <script>
        // Wait for PolyCSS to be ready
        customElements.whenDefined('poly-camera').then(() => {
            console.log('🍩 PolyCSS loaded successfully!');
            
            // Count elements after a delay to ensure rendering
            setTimeout(() => {
                const polygons = document.querySelectorAll('[part="polygon"]');
                const elements = document.querySelectorAll('poly-box, poly-icosahedron');
                
                document.getElementById('poly-count').textContent = polygons.length.toLocaleString();
                document.getElementById('elem-count').textContent = elements.length;
                
                console.log(`Polygons: ${polygons.length}, Elements: ${elements.length}`);
            }, 1500);
        });
        
        // Simple rotation animation
        const donut = document.getElementById('donut-group') || document.querySelector('poly-group');
        let rot = 0;
        function animate() {
            rot += 0.2;
            if (donut) {
                donut.setAttribute('rot-y', rot);
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
