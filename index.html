<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyCSS Donut 🍩 - CSS 3D Donut</title>
    <script type="module" src="https://esm.sh/@layoutit/polycss/elements"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at center, #2c1810 0%, #1a0f08 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            padding: 18px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 107, 107, 0.4);
            z-index: 1000;
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #ff8c42, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(255, 107, 107, 0.6));
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(255, 107, 107, 0.6)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 217, 61, 0.8)); }
        }
        
        .subtitle {
            font-size: 13px;
            opacity: 0.85;
            color: #ffd93d;
            letter-spacing: 0.5px;
        }
        
        .container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        poly-camera {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        
        poly-camera:active {
            cursor: grabbing;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 11px;
            border: 2px solid rgba(255, 140, 66, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            max-width: 200px;
        }
        
        .info-panel h3 {
            color: #ffd93d;
            margin-bottom: 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .info-panel div {
            margin: 5px 0;
            opacity: 0.85;
            display: flex;
            justify-content: space-between;
        }
        
        .info-panel span:first-child {
            opacity: 0.7;
        }
        
        .info-panel span:last-child {
            color: #4ecdc4;
            font-weight: 600;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            gap: 20px;
            border: 2px solid rgba(255, 140, 66, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        
        .control-key {
            background: linear-gradient(135deg, #ff6b6b, #ff8c42);
            padding: 3px 8px;
            border-radius: 5px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <h1>🍩 DONUT UNIVERSE 🍩</h1>
        <div class="subtitle">Pure CSS 3D • Every Sprinkle is a DOM Element • No WebGL</div>
    </header>
    
    <div class="container">
        <poly-camera 
            id="camera"
            rot-x="25" 
            rot-y="-25" 
            distance="700">
            
            <poly-scene>
                <poly-orbit-controls drag wheel></poly-orbit-controls>
                
                <!-- Lighting -->
                <poly-ambient-light intensity="0.6"></poly-ambient-light>
                <poly-directional-light intensity="1.0" x="150" y="200" z="150" color="#fff4e6"></poly-directional-light>
                <poly-directional-light intensity="0.3" x="-150" y="-100" z="-150" color="#ff6b9d"></poly-directional-light>
                
                <!-- Main Donut Group -->
                <poly-group id="donut-group" x="0" y="0" z="0">
                    <!-- Donut base - using multiple tori to create a thick donut -->
                    <!-- If poly-torus is not available, this will gracefully degrade -->
                    
                    <!-- Main donut body - using a torus if available, otherwise boxes in a ring -->
                    <poly-group id="donut-body">
                        <!-- We'll create a donut using multiple boxes arranged in a circle -->
                        <!-- This creates a "low-poly" donut effect -->
                    </poly-group>
                    
                    <!-- Glaze layer -->
                    <poly-group id="glaze-layer" y="3">
                    </poly-group>
                </poly-group>
                
                <!-- Floating mini donuts around the scene -->
                <poly-group id="mini-donuts"></poly-group>
                
                <!-- Decorative icosahedrons -->
                <poly-icosahedron size="20" color="#ffd93d" x="250" y="80" z="0" opacity="0.8"></poly-icosahedron>
                <poly-icosahedron size="20" color="#6bcf7f" x="-250" y="-60" z="80" opacity="0.8"></poly-icosahedron>
                <poly-icosahedron size="20" color="#4d96ff" x="0" y="100" z="-220" opacity="0.8"></poly-icosahedron>
                <poly-icosahedron size="18" color="#ff6b6b" x="180" y="-90" z="150" opacity="0.7"></poly-icosahedron>
                <poly-icosahedron size="18" color="#a78bfa" x="-200" y="70" z="-120" opacity="0.7"></poly-icosahedron>
                
            </poly-scene>
        </poly-camera>
        
        <div class="info-panel">
            <h3>🍩 Donut Stats</h3>
            <div><span>Polygons:</span><span id="poly-count">...</span></div>
            <div><span>Elements:</span><span id="elem-count">...</span></div>
            <div><span>FPS:</span><span id="fps">60</span></div>
            <div><span>Rotation:</span><span id="rotation">0°</span></div>
        </div>
        
        <div class="controls">
            <div class="control-item">
                <span class="control-key">DRAG</span>
                <span>Rotate</span>
            </div>
            <div class="control-item">
                <span class="control-key">SCROLL</span>
                <span>Zoom</span>
            </div>
            <div class="control-item">
                <span class="control-key">HOVER</span>
                <span>Inspect</span>
            </div>
        </div>
    </div>

    <script type="module">
        // Wait for PolyCSS to load
        await customElements.whenDefined('poly-camera');
        
        const donutGroup = document.getElementById('donut-group');
        const donutBody = document.getElementById('donut-body');
        const glazeLayer = document.getElementById('glaze-layer');
        const miniDonuts = document.getElementById('mini-donuts');
        
        // Create a donut using boxes arranged in a torus shape
        // This is a fallback if <poly-torus> is not available
        function createDonutWithBoxes(container, radius, tubeRadius, segments, color, yOffset = 0) {
            const boxes = [];
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                const box = document.createElement('poly-box');
                box.setAttribute('size', tubeRadius * 1.8);
                box.setAttribute('color', color);
                box.setAttribute('x', x);
                box.setAttribute('y', yOffset);
                box.setAttribute('z', z);
                box.setAttribute('rot-y', (angle * 180 / Math.PI) + 90);
                
                container.appendChild(box);
                boxes.push(box);
            }
            return boxes;
        }
        
        // Create main donut
        const mainDonut = createDonutWithBoxes(donutBody, 90, 22, 24, '#d2691e', 0);
        const glaze = createDonutWithBoxes(glazeLayer, 92, 20, 24, '#ff6b9d', 0);
        
        // Add sprinkles to the glaze
        const sprinkleColors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff8800'];
        for (let i = 0; i < 16; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radiusVariation = 85 + Math.random() * 14;
            const x = Math.cos(angle) * radiusVariation;
            const z = Math.sin(angle) * radiusVariation;
            
            const sprinkle = document.createElement('poly-box');
            sprinkle.setAttribute('size', '3');
            sprinkle.setAttribute('size-y', '8');
            sprinkle.setAttribute('color', sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)]);
            sprinkle.setAttribute('x', x);
            sprinkle.setAttribute('y', '8');
            sprinkle.setAttribute('z', z);
            sprinkle.setAttribute('rot-x', Math.random() * 360);
            sprinkle.setAttribute('rot-z', Math.random() * 360);
            
            glazeLayer.appendChild(sprinkle);
        }
        
        // Create mini floating donuts
        const miniPositions = [
            { x: 0, y: 180, z: 0, color: '#ffb347' },
            { x: 0, y: -180, z: 0, color: '#b19cd9' },
            { x: 200, y: 0, z: 0, color: '#ff7f7f' },
            { x: -200, y: 0, z: 0, color: '#7fbfff' },
        ];
        
        miniPositions.forEach((pos, i) => {
            const miniGroup = document.createElement('poly-group');
            miniGroup.setAttribute('x', pos.x);
            miniGroup.setAttribute('y', pos.y);
            miniGroup.setAttribute('z', pos.z);
            miniGroup.setAttribute('id', `mini-${i}`);
            
            createDonutWithBoxes(miniGroup, 25, 7, 12, pos.color, 0);
            miniDonuts.appendChild(miniGroup);
        });
        
        // Animation
        let rotation = 0;
        let time = 0;
        
        function animate() {
            rotation += 0.4;
            time += 0.015;
            
            // Rotate main donut
            if (donutGroup) {
                donutGroup.setAttribute('rot-y', rotation);
                donutGroup.setAttribute('rot-x', Math.sin(time * 0.5) * 10);
            }
            
            // Animate mini donuts
            document.querySelectorAll('[id^="mini-"]').forEach((mini, i) => {
                const offset = i * Math.PI * 0.5;
                mini.setAttribute('rot-y', rotation * (1 + i * 0.2));
                mini.setAttribute('rot-x', Math.sin(time + offset) * 20);
            });
            
            // Update stats
            document.getElementById('rotation').textContent = Math.floor(rotation % 360) + '°';
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Update polygon count
        setTimeout(() => {
            const polygons = document.querySelectorAll('[part="polygon"]');
            const elements = document.querySelectorAll('poly-box, poly-icosahedron, poly-group');
            document.getElementById('poly-count').textContent = polygons.length.toLocaleString();
            document.getElementById('elem-count').textContent = elements.length;
            
            console.log(`%c🍩 DONUT LOADED!`, 'color: #ff6b6b; font-size: 18px; font-weight: bold;');
            console.log(`%cPolygons: ${polygons.length} | Elements: ${elements.length}`, 'color: #ffd93d;');
            console.log(`%cMade with pure CSS 3D transforms - no WebGL!`, 'color: #4ecdc4;');
        }, 1000);
        
        // FPS counter
        let lastTime = performance.now();
        let frames = 0;
        function countFPS() {
            frames++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                document.getElementById('fps').textContent = frames;
                frames = 0;
                lastTime = now;
            }
            requestAnimationFrame(countFPS);
        }
        countFPS();
    </script>
</body>
</html>
