<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyCSS 3D Demo - Self-Contained</title>
    <script type="module" src="https://esm.sh/@layoutit/polycss/elements"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 14px;
            opacity: 0.7;
        }
        
        .container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        poly-camera {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        
        poly-camera:active {
            cursor: grabbing;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 13px;
            display: flex;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.8;
        }
        
        .control-key {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
        }
        
        .info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            font-size: 12px;
            max-width: 200px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        
        .info h3 {
            margin-bottom: 8px;
            color: #4ecdc4;
            font-size: 13px;
        }
        
        .info ul {
            list-style: none;
            opacity: 0.8;
        }
        
        .info li {
            margin: 4px 0;
            padding-left: 12px;
            position: relative;
        }
        
        .info li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #ff6b6b;
        }
        
        /* Style individual polygons on hover */
        poly-mesh::part(polygon):hover {
            filter: brightness(1.3) saturate(1.2);
            transition: filter 0.2s ease;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎨 PolyCSS 3D Demo</h1>
        <div class="subtitle">Pure CSS 3D Rendering • No WebGL • No Canvas • Just DOM Elements</div>
    </header>
    
    <div class="container">
        <poly-camera 
            id="mainCamera"
            rot-x="25" 
            rot-y="35" 
            distance="800"
            style="background: transparent;">
            
            <poly-scene>
                <!-- Orbit controls for mouse interaction -->
                <poly-orbit-controls 
                    drag 
                    wheel 
                    animate-speed="0.2">
                </poly-orbit-controls>
                
                <!-- Ambient light -->
                <poly-ambient-light intensity="0.4"></poly-ambient-light>
                
                <!-- Directional light -->
                <poly-directional-light 
                    intensity="0.8" 
                    x="100" 
                    y="200" 
                    z="150">
                </poly-directional-light>
                
                <!-- Central icosahedron -->
                <poly-icosahedron 
                    id="centerPiece"
                    size="80" 
                    color="#ff6b6b"
                    x="0" 
                    y="0" 
                    z="0"
                    rot-x="0"
                    rot-y="0"
                    rot-z="0">
                </poly-icosahedron>
                
                <!-- Orbiting boxes -->
                <poly-box 
                    size="40" 
                    color="#4ecdc4"
                    x="150" 
                    y="0" 
                    z="0">
                </poly-box>
                
                <poly-box 
                    size="40" 
                    color="#45b7d1"
                    x="-150" 
                    y="0" 
                    z="0">
                </poly-box>
                
                <poly-box 
                    size="40" 
                    color="#ffd166"
                    x="0" 
                    y="0" 
                    z="150">
                </poly-box>
                
                <poly-box 
                    size="40" 
                    color="#ef476f"
                    x="0" 
                    y="0" 
                    z="-150">
                </poly-box>
                
                <!-- Top and bottom -->
                <poly-octahedron 
                    size="50" 
                    color="#9b5de5"
                    x="0" 
                    y="120" 
                    z="0">
                </poly-octahedron>
                
                <poly-octahedron 
                    size="50" 
                    color="#00bbf9"
                    x="0" 
                    y="-120" 
                    z="0">
                </poly-octahedron>
                
                <!-- Ground plane -->
                <poly-box 
                    size-x="400"
                    size-y="10"
                    size-z="400"
                    color="#2d3436"
                    y="-180"
                    opacity="0.8">
                </poly-box>
                
            </poly-scene>
        </poly-camera>
        
        <div class="info">
            <h3>🎯 About This Demo</h3>
            <ul>
                <li>Pure CSS 3D transforms</li>
                <li>Each polygon is a DOM element</li>
                <li>No WebGL or Canvas</li>
                <li>Inspect with DevTools!</li>
                <li>~500 DOM elements</li>
            </ul>
        </div>
        
        <div class="controls">
            <div class="control-item">
                <span class="control-key">🖱️ Drag</span>
                <span>Rotate</span>
            </div>
            <div class="control-item">
                <span class="control-key">Scroll</span>
                <span>Zoom</span>
            </div>
            <div class="control-item">
                <span class="control-key">Hover</span>
                <span>Highlight</span>
            </div>
        </div>
    </div>

    <script>
        // Add some interactive animation
        const centerPiece = document.getElementById('centerPiece');
        const camera = document.getElementById('mainCamera');
        
        let rotation = 0;
        let autoRotate = true;
        
        function animate() {
            if (autoRotate && centerPiece) {
                rotation += 0.5;
                centerPiece.setAttribute('rot-y', rotation);
                centerPiece.setAttribute('rot-x', rotation * 0.7);
            }
            requestAnimationFrame(animate);
        }
        
        // Start animation
        animate();
        
        // Pause auto-rotation when user interacts
        camera.addEventListener('mousedown', () => {
            autoRotate = false;
        });
        
        camera.addEventListener('mouseup', () => {
            setTimeout(() => {
                autoRotate = true;
            }, 2000);
        });
        
        // Log info to console
        console.log('%c🎨 PolyCSS 3D Demo Loaded!', 'color: #4ecdc4; font-size: 16px; font-weight: bold;');
        console.log('%cEach 3D shape is made of real DOM elements with CSS transforms', 'color: #888;');
        console.log('%cTry inspecting the elements in DevTools!', 'color: #888;');
        console.log('%cDrag to rotate • Scroll to zoom • Hover polygons to highlight', 'color: #ffd166;');
        
        // Count polygons after load
        setTimeout(() => {
            const polygons = document.querySelectorAll('[part="polygon"]');
            console.log(`%c📊 Total polygons rendered: ${polygons.length}`, 'color: #ff6b6b; font-weight: bold;');
        }, 1000);
    </script>
</body>
</html>
